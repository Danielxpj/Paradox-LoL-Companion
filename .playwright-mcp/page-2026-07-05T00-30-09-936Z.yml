            - paragraph [ref=e171]:
              - text: Whether you’re a beginner about to learn a
              - link "new champion" [ref=e172] [cursor=pointer]:
                - /url: https://mobalytics.gg/lol/champions/vex/build
              - text: or a veteran queueing up for ranked, the Mobalytics Overlay + Live Companion are your ultimate tools for preparing you for your next League match.
            - paragraph [ref=e173]: These features allow you to directly import recommended builds into your client, scout all the players in your game, learn how to play lane matchups, and even give you a constant feed of insights while you play.
            - paragraph [ref=e174]: To be honest, that’s just the tip of the iceberg and not even half the things they do!
            - paragraph [ref=e175]: In this guide, we’ll be covering these two tools together since they go hand in hand in aiding you before, during, and after your match.
            - paragraph [ref=e176]:
              - text: If you have our Desktop App downloaded and updated, the new Overlay should activate the next time you play. Don’t have it downloaded yet? No worries,
              - link "you can download it here for free." [ref=e177] [cursor=pointer]:
                - /url: https://mobalytics.gg/lol-overlay/
              - text: "!"
            - heading "League of Legends Overlay Guide" [level=3] [ref=e178]
            - paragraph [ref=e179]: Our new League of Legends Overlay really pushes the envelope for giving you the insights you need most while you play.
            - paragraph [ref=e180]: We wanted to help players keep in mind the insights we recommended during the Pre Game portion of the Live Companion while offering a constant flow of relevant information to help them adapt during a match.
            - paragraph [ref=e181]:
              - link "Pulsefire Pantheon (LoL splash)" [ref=e182] [cursor=pointer]:
                - /url: https://cdnportal.mobalytics.gg/production/2020/04/pulsefire-pantheon.jpg
                - img "Pulsefire Pantheon (LoL splash)" [ref=e183]
            - paragraph [ref=e184]: In the following sections, we’ll cover how to use the Overlay and how to get the most out of its features!
            - heading "How to Use the Overlay" [level=4] [ref=e185]
            - paragraph [ref=e186]: If you have the right summoner name set in your Desktop App’s Settings, your Overlay will be ready to go as soon as you’re in-game.
            - paragraph [ref=e187]: Just press Tab to open your scoreboard and you’ll see a purple section on the left side of your screen.
            - paragraph [ref=e188]:
              - link "LoL Overlay Tab pop up" [ref=e189] [cursor=pointer]:
                - /url: https://cdnportal.mobalytics.gg/production/2020/11/8448ac2a-lol-overlay-tab-pop-up.jpg
                - img "LoL Overlay Tab pop up" [ref=e190]
            - paragraph [ref=e191]: "While holding Tab, you can press Q, W, E, or S to access the different parts of the Overlay. These different features are:"
            - list [ref=e192]:
              - listitem [ref=e193]: Tab + Q = Player Stats and Insights
              - listitem [ref=e194]: Tab + W = Game Overview
              - listitem [ref=e195]: Tab + E = Matchup Info
              - listitem [ref=e196]: Tab + S = Settings
            - paragraph [ref=e197]: It might take some time to get used to these hotkeys, but once you do, it really becomes easy to get the information you want when you need it most.
            - heading "Player Stats and Insights (Tab + Q)" [level=5] [ref=e198]
            - paragraph [ref=e199]: A major part of succeeding in League of Legends is being able to plan around the strengths and weaknesses of your team.
            - paragraph [ref=e200]: Although Riot tries their best to balance their matchmaking, the reality is that there will always be some sort of imbalance across the five roles.
            - paragraph [ref=e201]: This tab allows you to recall the scouting that our Live Companion provides during champ select and while you load into the game to help you play around these imbalances.
            - paragraph [ref=e202]:
              - link "LoL Overlay Tab + Q Ashe Game" [ref=e203] [cursor=pointer]:
                - /url: https://cdnportal.mobalytics.gg/production/2020/11/e4850e81-lol-overlay-tab-q-ashe-game.jpg
                - img "LoL Overlay Tab + Q Ashe Game" [ref=e204]
            - paragraph [ref=e205]: This will probably look familiar to many of you, but to give you a brief rundown, here you’ll find stats for all ten players along with playstyle badges.
            - paragraph [ref=e206]: You can see how many games each player has played in their specific role and for that specific champion, along with their win rates for those categories.
            - paragraph [ref=e207]: This makes it easy to understand which players will be in their comfort zone and which ones don’t have as much proficiency.
            - paragraph [ref=e208]: Below the stats, you’ll find colored playstyle badges. Green badges represent positive traits, red are negative, and yellow are neutral, just hover them for more details.
            - paragraph [ref=e209]: These badges are defined by our algorithm which takes into account the stats from every player’s matches.
            - paragraph [ref=e210]: "Here are some examples:"
            - list [ref=e211]:
              - listitem [ref=e212]:
                - generic [ref=e213]: Wrecking Ball = This player excels in dealing damage to structures.
              - listitem [ref=e214]: Ready to Rumble = For better or worse, this player looks to create action in the early game.
              - listitem [ref=e215]: Improbable Pinks = This player rarely uses Control Wards.
            - paragraph [ref=e216]: By having these tendencies in the back of your mind, you can improve your risk/reward evaluations.
            - paragraph [ref=e217]: For example, since Cho’Gath has Improbable Pinks, Ekko and Rammus may want to consider ganking for Kayle as there is a good chance that Cho will have a blindspot.
            - paragraph [ref=e218]: In comparison, both Vayne and Pyke have green badges that indicate they look to ward early.
            - paragraph [ref=e219]: Note that since these are based on overall trends, they are not guaranteed so expect the unexpected.
            - paragraph [ref=e220]: But in many cases, you can use these as guidelines to help the consistency of your decision-making.
            - heading "Game Overview (Tab + W)" [level=5] [ref=e221]
            - paragraph [ref=e222]: The Game Overview is your best tool for evaluating the state of your match with a live feed of stats and information.
            - paragraph [ref=e223]: It basically condenses information that you could have gathered by interpreting your scoreboard – things such as which lanes have hit their power spikes, who has a gold lead, and so on.
            - paragraph [ref=e224]: This tool will help save you time and brainpower by giving you this information automatically.
            - paragraph [ref=e225]:
              - link "LoL Overlay Tab + W events screenshot" [ref=e226] [cursor=pointer]:
                - /url: https://cdnportal.mobalytics.gg/production/2020/11/2dd46346-lol-overlay-tab-w-events-screenshot.jpg
                - img "LoL Overlay Tab + W events screenshot" [ref=e227]
            - paragraph [ref=e228]: For example, when your enemies hit level 6 and unlock their ultimate, you’ll receive a handy pop-up!
            - paragraph [ref=e229]: Same thing for when they complete major items like Trinity Force or upgraded boots. In the screenshot above, you can see this pop-up above Ashe’s health bar.
            - paragraph [ref=e230]: Don’t worry, if you don’t like the positioning of the pop-up, you have many choices (we’ll discuss this in the Tab + S Settings section below).
            - paragraph [ref=e231]: All of these pop-ups can be found within the Events feed, just in case you missed them since you were focused on teamfighting or Smiting.
            - paragraph [ref=e232]: By default, it’ll show the recent pop-ups for all champions but you can click on any of the icons to isolate to one champion.
            - paragraph [ref=e233]: In addition for item builds, when a player finishes an item, you will see an indication here (you can see that Warwick leads with four completed items).
            - paragraph [ref=e234]:
              - link "LoL Overlay Tab + W completed items" [ref=e235] [cursor=pointer]:
                - /url: https://cdnportal.mobalytics.gg/production/2020/11/ea891836-lol-overlay-tab-w-completed-items.jpg
                - img "LoL Overlay Tab + W completed items" [ref=e236]
            - paragraph [ref=e237]: The other big part of Tab + W is the Standings section.
            - paragraph [ref=e238]: Want to know which players are dominating the game? You can see how everyone ranks with statistical standings.
            - paragraph [ref=e239]: Wondering how the head to head matchups are going? Yup, you can see that too!
            - paragraph [ref=e240]:
              - link "LoL Overlay Tab + W Standings screenshot" [ref=e241] [cursor=pointer]:
                - /url: https://cdnportal.mobalytics.gg/production/2020/11/c5f361ae-lol-overlay-tab-w-standings-screenshot.jpg
                - img "LoL Overlay Tab + W Standings screenshot" [ref=e242]
            - paragraph [ref=e243]: Overall, this is my personal favorite section of the Overlay as it’s one of the most unique tools out there right now for League.
            - paragraph [ref=e244]: And if you’re wondering, yes, it is approved by Riot!
            - heading "Matchup Info (Tab + E)" [level=5] [ref=e245]
            - paragraph [ref=e246]: This feature is the most useful tool during your early game, as it provides context for each role’s lane matchup.
            - paragraph [ref=e247]: You’ll find useful tips like individual power spikes for early/mid/late game, ability cooldowns, and matchup specific advice.
            - paragraph [ref=e248]:
              - link "LoL Overlay Tab + E Leona MatchupLoL Overlay Tab + E Leona Matchup" [ref=e249] [cursor=pointer]:
                - /url: https://cdnportal.mobalytics.gg/production/2020/11/f3d3e7e7-lol-overlay-tab-e-leona-matchup.jpg
                - img "LoL Overlay Tab + E Leona MatchupLoL Overlay Tab + E Leona Matchup" [ref=e250]
            - paragraph [ref=e251]: By clicking any of the icons at the top, you can see this information for other champions as well.
            - paragraph [ref=e252]: Overall, it’s handy for preparing your plans for the laning phase and understanding the power spikes of the other matchups around the Rift.
            - paragraph [ref=e253]: Once the mid game begins, it’s a little bit tougher to use since champions will begin roaming or switching to other lanes so be sure to prioritize checking it before the first turrets start going down.
            - heading "Settings (Tab + S)" [level=5] [ref=e254]
            - paragraph [ref=e255]: Last but not least is the Overlay Settings. It isn’t the flashiest of tools but it’s good to understand what it offers to get the most from your experience!
            - paragraph [ref=e256]: For example, you can toggle the notifications off and on and change the location of where your pop-ups show up.
            - paragraph [ref=e257]:
              - link "LoL Overlay Tab + S Notification locations" [ref=e258] [cursor=pointer]:
                - /url: https://cdnportal.mobalytics.gg/production/2020/11/60d94d38-lol-overlay-tab-s-notification-locations.jpg
                - img "LoL Overlay Tab + S Notification locations" [ref=e259]
            - paragraph [ref=e260]: You’ll also find options for scaling (make the Overlay tools bigger or smaller) and transparency (allows you to make the windows see-through or more opaque)
            - paragraph [ref=e261]:
              - link "LoL Overlay Tab + S general" [ref=e262] [cursor=pointer]:
                - /url: https://cdnportal.mobalytics.gg/production/2020/11/6d149549-lol-overlay-tab-s-general.jpg
                - img "LoL Overlay Tab + S general" [ref=e263]
            - paragraph [ref=e264]: Lastly, you’ll find a reference section for the Hotkeys. This is kind of a spoiler for Tab + A, but we’ll be adding a handy Item Cheatsheet very soon.
            - paragraph [ref=e265]:
              - link "Overlay Tab + S hotkeys reference" [ref=e266] [cursor=pointer]:
                - /url: https://cdnportal.mobalytics.gg/production/2020/11/85af4bce-overlay-tab-s-hotkeys-reference.jpg
                - img "Overlay Tab + S hotkeys reference" [ref=e267]
            - paragraph [ref=e268]: We plan to eventually make these hotkeys customizable so keep an eye out!
            - heading "Live Companion Guide" [level=3] [ref=e269]
            - paragraph [ref=e270]: Below, you’ll find our original guide from when our Live Companion launched in April 2020! If you read the previous section, you’ll know that some of these features (like the colored playstyle badges), were upgraded in our November 2020 update with the launch of our Overlay.
            - paragraph [ref=e271]: However, most of it will still hold true and be useful in helping you get the most out of the feature. As always, please do leave a comment if you have any questions and we’ll answer it as soon as we can.
            - heading "Before You Queue" [level=4] [ref=e272]
            - paragraph [ref=e273]: As you get ready to jump into queuing, the Live Companion will provide you with a quick look at your ten most recent games and provide recommendations based on your identity as a player.
            - paragraph [ref=e274]:
              - img "Live companion home" [ref=e275]
            - heading "Tier List Highlights" [level=5] [ref=e276]
            - paragraph [ref=e277]: Here, you’ll find the most powerful champions for your role in the current patch’s meta.
            - paragraph [ref=e278]: If you’re curious about the other roles, just hit the drop-down menu at the top right.
            - paragraph [ref=e279]:
              - img "tier list highlights" [ref=e280]
            - paragraph [ref=e281]: This can be helpful for helping you understand which of the champions from your pool are optimal for climbing.
            - paragraph [ref=e282]: It’s also useful for scouting which champions may be worth using your ban on.
            - paragraph [ref=e283]:
              - text: By the way, if you click on any of the icons, it will lead you straight to their
              - link "champion page" [ref=e284] [cursor=pointer]:
                - /url: https://mobalytics.gg/ko_kr/lol/champions
              - text: "!"
            - heading "My Champions" [level=5] [ref=e285]
            - paragraph [ref=e286]: Under this section, we highlight some stats from your most played champions from your pool.
            - paragraph [ref=e287]:
              - img "my champions pool" [ref=e288]
            - paragraph [ref=e289]: Even if your champion isn’t S-tier, you can still find a lot of success with your comfort picks, so be sure to strike the right balance for yourself.
            - heading "New Champion Recommendation" [level=5] [ref=e290]
            - paragraph [ref=e291]: This feature is more suited for playing Normal or Flex matches since it’s more about experimenting (you gotta protect that solo queue LP!).
            - paragraph [ref=e292]:
              - img "champion recommendation" [ref=e293]
            - paragraph [ref=e294]: Its goal is to help you expand your pool based on the free champion rotation based on the champions you typically like to play.
            - heading "Skill to Focus" [level=5] [ref=e295]
            - paragraph [ref=e296]:
              - text: Finally, we have a reminder of your Skill to Focus from your
              - link "Gamer Performance Index (GPI)" [ref=e297] [cursor=pointer]:
                - /url: https://mobalytics.gg/lol/lp/gpi
              - text: .
            - paragraph [ref=e298]:
              - img "live companion skill to focus" [ref=e299]
            - paragraph [ref=e300]: If you don’t know what the GPI is, it’s a feature that basically analyzes your unique playstyle as a player based on all your matches.
            - paragraph [ref=e301]: After taking a look at your strengths and weaknesses, it recommends skills to focus on improving in order to see the most gains.
            - paragraph [ref=e302]: You only need a few games played in the same role and game mode to see your GPI analysis so be sure to check it out when you’re exploring other Mobalytics features.
            - heading "Before Your Match Begins (Champ Select and Loading)" [level=4] [ref=e303]
            - paragraph [ref=e304]: "As soon as you hit Play and enter your match’s Champ Select, your Live Companion will transform right before your eyes into something like you see below:"
            - paragraph [ref=e305]:
              - img "better pre game tab" [ref=e306]
            - paragraph [ref=e307]: This is where the magic happens and where you can really find what you’re looking for based on your needs.
            - heading "Player Scouting" [level=5] [ref=e308]
            - paragraph [ref=e309]: "Let’s start off with the players in your match – here you can immediately see:"
            - list [ref=e310]:
              - listitem [ref=e311]: Rankings
              - listitem [ref=e312]: Number of games played + win rate for their role
              - listitem [ref=e313]: Number of games played + win rate for their champion
              - listitem [ref=e314]: Summoner Spells + runes
              - listitem [ref=e315]: Playstyle badges
            - paragraph [ref=e316]:
              - img "head to head comparison pre game tab" [ref=e317]
            - paragraph [ref=e318]: You can quickly draw a lot of value from this information as you can make projections of which matchups will be favored based on the skill, win rates, and experience of the players on their champ and role.
            - paragraph [ref=e319]: By taking a look at Summoner Spells, you can see which players are looking to play more aggressively (with choices like Ignite) or more macro-based (with choices like Teleport).
            - paragraph [ref=e320]: The playstyle badges offer additional evaluations – for example, we can see that the Yuumi player is actually a Jungle main that is playing off-role.
            - paragraph [ref=e321]: Meanwhile, their counterpart, is a Blitzcrank main with a ton of experience.
            - paragraph [ref=e322]: To learn about any badge, just hover it for more information!
            - paragraph [ref=e323]:
              - img "blitzcrank main badge" [ref=e324]
            - 'heading "New Features: Profile Summary + Player Comparison" [level=5] [ref=e325]'
            - paragraph [ref=e326]: If you want to get even more of a download on a player you’ve only seen the tip of the iceberg!
            - heading "Profile Summary" [level=6] [ref=e327]:
              - strong [ref=e328]: Profile Summary
            - paragraph [ref=e329]: Let’s take a closer look by clicking on the Azir player from this match.
            - paragraph [ref=e330]:
              - img "highlighting player pre game tab" [ref=e331]
            - paragraph [ref=e332]: Here we can take a deeper look at their recent matches, the other champions they tend to play, their average stats, and even their GPI graph.
            - paragraph [ref=e333]:
              - img "scouting azir player" [ref=e334]
            - paragraph [ref=e335]: From the overall look of things, we can understand that this Azir tends to farm very well and plays aggressively but has trouble staying alive.
            - paragraph [ref=e336]: At the top, you can click on any of the other champion icons at the top to scout other players.
            - heading "Player Comparison" [level=6] [ref=e337]:
              - strong [ref=e338]: Player Comparison
            - paragraph [ref=e339]: In between the champion icons shown above, you’ll notice that this is one of two icons – if you select the second you’ll be brought to the side-by-side player comparison tab.
            - paragraph [ref=e340]:
              - img "side by side mid lane comparison" [ref=e341]
            - paragraph [ref=e342]:
              - text: Here you can see how Cassipeia vs Azir stack up in terms of the GPI’s
              - link "Fighting Skill" [ref=e343] [cursor=pointer]:
                - /url: https://mobalytics.gg/blog/league-of-legends-advanced-fighting-positioning-guide/
              - text: .
            - paragraph [ref=e344]: By sorting through the icons at the bottom, you can also see comparisons based on Vision, Farming, Survivability, and more!
            - paragraph [ref=e345]: If you’ve been following along closely, you probably already figured out that you can switch to see how the players of other roles stack up against each other.
            - paragraph [ref=e346]: This makes this feature especially useful for identifying which lanes will have the upper hand and the lanes that will likely be playing from behind, so plan accordingly!
            - 'heading "More Insights: Builds, Matchup Advice, Team Stats, and More!" [level=5] [ref=e347]'
            - paragraph [ref=e348]: Now that we’ve explored the player scouting section, let’s dive into the right side of the Live Companion’s Pre Game!
            - paragraph [ref=e349]: This section scrolls down quite a bit so there’s a lot more that we’ll be covering besides what you see in the image below.
            - paragraph [ref=e350]:
              - img "better pre game tab" [ref=e351]
            - 'heading "Builds: Items, Runes, Skill Order, and More!" [level=6] [ref=e352]':
              - strong [ref=e353]: "Builds: Items, Runes, Skill Order, and More!"
            - paragraph [ref=e354]: Finding the right builds for your champion can take a lot of research time and distracts you from focusing on your gameplan.
            - paragraph [ref=e355]: Our Live Companion allows you to instantly import your items, runes, and even your Summoner Spells directly into your client!
            - paragraph [ref=e356]: If you take a look at the image below, you can even see that you’ll have multiple choices for a single champion based on different roles and playstyles.
            - paragraph [ref=e357]:
              - img "items import before match" [ref=e358]
            - paragraph [ref=e359]: This gives you flexibility in adjusting to what your team’s needs while still saving you some research time. Just hit the Import button as soon as you make your decision.
            - paragraph [ref=e360]: If you want to save even more time you can set your Live Companion to Auto-Import in your Settings.
            - paragraph [ref=e361]:
              - img "auto-import" [ref=e362]
            - paragraph [ref=e363]: Based on your build, you’ll also have a recommended Skill Order provided.
            - paragraph [ref=e364]:
              - img "skill order" [ref=e365]
            - paragraph [ref=e366]: Lastly, we even provide a How to Start section that acts as a sort of “starter kit” refresher for what you should do at level 1.
            - paragraph [ref=e367]:
              - img "how to start" [ref=e368]
            - paragraph [ref=e369]: Quick recommendations, first skill and your first item(s)
            - heading "Champion Combos" [level=6] [ref=e370]:
              - strong [ref=e371]: Champion Combos
            - paragraph [ref=e372]: Once you have your builds ready to go, it’s time to brush up on your bread and butter combos curated by experts who main your champion.
            - paragraph [ref=e373]: We’ll several options based on different situations. For example, below you can see a Cassiopeia combo that’s useful after you have your ultimate.
            - paragraph [ref=e374]:
              - img "cassiopeia combo" [ref=e375]
            - paragraph [ref=e376]: This section is especially helpful if you’re a beginner or trying out a champion, so don’t forget to check it out the next time you’re experimenting with the free rotation.
            - 'heading "Lane Matchups: Advice, Stats, and Power Spikes" [level=5] [ref=e377]'
            - paragraph [ref=e378]: After you understand what you’re going to be doing in regards to your individual champion, the next thing to think about is your matchup against your role counterpart.
            - paragraph [ref=e379]: If you want to know about another role you can of course explore that as well.
            - heading "Matchup Stats, Opponent Insight, and Matchup Specific Advice" [level=6] [ref=e380]:
              - strong [ref=e381]: Matchup Stats, Opponent Insight, and Matchup Specific Advice
            - paragraph [ref=e382]: This widget is comprised of three parts that aim to prepare you for your upcoming head to head battle.
            - paragraph [ref=e383]: First off, you’ll see the general stats of win rate, avg gold at 15 minutes, and average kills in lane.
            - paragraph [ref=e384]: This should give you an idea of how proficient they are on their champ, how well they farm during the early game, and how many kills they tend to get during the laning phase.
            - paragraph [ref=e385]:
              - img "playing against matchup advice cass vs azir" [ref=e386]
            - paragraph [ref=e387]: Next up is the Opponent Insight, which indicates a player’s recent performance stats against your specific champion.
            - paragraph [ref=e388]: This Azir is pretty well-versed when playing into Cassiopeia! We can see that in the past two weeks, they won 88% of their matches over 9 games.
            - paragraph [ref=e389]: Luckily…the Cassiopeia has matchup-specific advice at their disposal to help them beat the Azir.
            - paragraph [ref=e390]: However, the Live Companion provides advice for both sides of a matchup – so if the Azir also has the Live Companion they’ll also have advice for how to beat Cassiopeia as Azir.
            - paragraph [ref=e391]: As a disclaimer, we won’t have every single matchup for things like Nocturne vs Jungle Soraka, but if there’s a matchup that’s suddenly popular expect to see it soon!
            - heading "Champion Power Spikes" [level=6] [ref=e392]:
              - strong [ref=e393]: Champion Power Spikes
            - heading "champion power spikes" [level=3] [ref=e394]:
              - img "champion power spikes" [ref=e395]
            - paragraph [ref=e396]:
              - text: Every champion is designed to have
              - link "power spikes" [ref=e397] [cursor=pointer]:
                - /url: https://mobalytics.gg/blog/how-to-understand-power-spikes-using-mobalytics/
              - text: . Draven spikes early game, Veigar spikes late game, and so on.
            - paragraph [ref=e398]: "We’ve streamlined champion powers pikes into a three-phase system using stoplight colors:"
            - list [ref=e399]:
              - listitem [ref=e400]: Green = when a champion is relatively strong compared to other champs
              - listitem [ref=e401]: Yellow = when a champion is relatively at average strength compared to other champs
              - listitem [ref=e402]: Red = when a champion is relatively weak compared to other champs
            - paragraph [ref=e403]: Remember that these are helpful guidelines that should be used in combination with your game state.
            - paragraph [ref=e404]: If the Draven has an 0-2 start or the Veigar manages to get a 2-0 early on, their power spikes will be respectively stifled or accelerated.
            - 'heading "Team Analysis: Stats, Damage Type Distribution, and Gank Opportunities" [level=5] [ref=e405]'
            - paragraph [ref=e406]: First, we covered your individual champ. Next, we covered your lane matchup.
            - paragraph [ref=e407]: If you’re paying close attention you can probably guess that the next step is comparing the two teams in your match!
            - 'heading "New Feature: Team Power Spikes" [level=6] [ref=e408]':
              - strong [ref=e409]: "New Feature: Team Power Spikes"
            - paragraph [ref=e410]: In our recent update, we expanded our power spike feature to now compare the two team comps in your match.
            - paragraph [ref=e411]: Below you can see that the left team will have their best chance to win in the early and mid game.
            - paragraph [ref=e412]:
              - img "pre game team power spikes" [ref=e413]
            - paragraph [ref=e414]: If the team on the right is able to stretch the game out until late game, they’ll be able to take control with their superior scaling.
            - paragraph [ref=e415]: "We’ll also provide major team stats such as:"
            - list [ref=e416]:
              - listitem [ref=e417]: Average Win Rate
              - listitem [ref=e418]: Average KDA
              - listitem [ref=e419]: Average Gold/min
              - listitem [ref=e420]: Average Damage/min
              - listitem [ref=e421]: Average Wards Placed/min.
            - paragraph [ref=e422]: This widget is especially useful in organized competitive play and Clash so be sure to give your teammates the scoop to help you play optimally.
            - heading "Damage Type Distribution" [level=6] [ref=e423]:
              - strong [ref=e424]: Damage Type Distribution
            - paragraph [ref=e425]:
              - text: Although our platform imports builds directly into your client, it’s important to still be adaptable (after all,
              - link "Versatility" [ref=e426] [cursor=pointer]:
                - /url: https://mobalytics.gg/blog/versatility-how-to-be-flexible-and-adapt-in-league-of-legends/
              - text: is one of our GPI skills).
            - paragraph [ref=e427]: We’ve included a damage type widget to help you understand the respective damage types of each team so you can adjust your situational items accordingly.
            - paragraph [ref=e428]:
              - img "damage type distribution" [ref=e429]
            - paragraph [ref=e430]: If you’re against an AD heavy comp, you’ll want to consider getting a Zhonya’s a bit earlier.
            - paragraph [ref=e431]: If your team is primarily AD but you’re playing a champion like Kai’Sa, you can adapt to a more AP-suited build.
            - heading "Gank Opportunities" [level=6] [ref=e432]:
              - strong [ref=e433]: Gank Opportunities
            - paragraph [ref=e434]: Lastly, we have Gank Opportunities. This widget factors in variables like power spikes, crowd control, and kill power for both teams to analyze how feasible it is to gank or roam to each lane.
            - paragraph [ref=e435]
            - paragraph [ref=e436]: Similar to our power spike colors, green represents an easier opportunity while red represents a more difficult one.
            - paragraph [ref=e437]
            - paragraph [ref=e438]: You can toggle to see the opportunities for both teams. Use this to understand which lanes are juicy for your team and which of your lanes you have to consider sending extra protection to.
            - heading "After Your Match" [level=4] [ref=e439]
            - paragraph [ref=e440]: Once your game finishes, the Live Companion will give you an in-depth report to help you learn from it whether you won or lost.
            - paragraph [ref=e441]: It’s also a great resource for learning about other players, which we’ll cover in a bit.
            - paragraph [ref=e442]:
              - img "post game tab" [ref=e443]
            - heading "Top Performers" [level=5] [ref=e444]
            - paragraph [ref=e445]: The first thing you’ll see on the left will be a summary of the top performers in your match.
            - paragraph [ref=e446]:
              - img "post game badges" [ref=e447]
            - paragraph [ref=e448]: These are pretty standard metrics from highest CS and highest damage to the most gold and best KDA but we also include an MVP to highlight the best overall player.
            - heading "Post Game Team Stats" [level=5] [ref=e449]
            - paragraph [ref=e450]: Next, you’ll see stats from all the players in your game. You’ll find pretty much everything you’d expect from warding stats, CS numbers, and their item builds.
            - paragraph [ref=e451]: However, something unique that we have is ranking players from 1st to 10th based on how they did.
            - paragraph [ref=e452]:
              - img "live companion post game team stats" [ref=e453]
            - paragraph [ref=e454]: We all have bad games every once in a while so don’t feel too bad if you’re in the bottom five, but this is a helpful indicator of when you’re playing well despite your team losing or playing poorly despite the rest of your team doing well.
            - paragraph [ref=e455]: Ideally, you’ll want to increase the first case and limit the latter because it represents games where you were throwing.
            - heading "Expanded Player Stats and Info" [level=5] [ref=e456]
            - paragraph [ref=e457]: In the image above, notice how there are arrows to the right of the item builds.
            - paragraph [ref=e458]: If you click on the arrow in Urgot’s row, we’ll find more stats and information about their build choices.
            - paragraph [ref=e459]: Below, you can see how effectively they used their runes, from the true damage dealt from Conqueror to how fast they were able to bring their Magical Footwear online.
            - paragraph [ref=e460]:
              - img "urgot runes post game" [ref=e461]
            - paragraph [ref=e462]: If you like researching streamers or high ELO players, the next sections are for you.
            - paragraph [ref=e463]: Underneath the rune stats, you’ll find their skill order and item path.
            - paragraph [ref=e464]:
              - img "skill order and item path post game" [ref=e465]
            - paragraph [ref=e466]: This is useful for understanding players who are trying out new builds before they become meta.
            - paragraph [ref=e467]: You can also use it to measure yourself against their timings – are you able to hit Rod of Ages as fast as your favorite Ryze player?
            - heading "Personal Badges" [level=5] [ref=e468]
            - paragraph [ref=e469]: We give players playstyle badges before a game so it’s only natural that we give them some feedback after their match.
            - paragraph [ref=e470]: There are a ton of these in our system from recording achievements like Pentakills to taking a deeper dive into gold stats as shown below.
            - paragraph [ref=e471]:
              - img "personal achievements post game" [ref=e472]
            - paragraph [ref=e473]: Note that these aren’t always positive, sometimes we’ll put you on blast, such as when you don’t place any wards!
            - paragraph [ref=e474]:
              - img "no control badge" [ref=e475]
            - heading "Team Stat Comparisons" [level=5] [ref=e476]
            - paragraph [ref=e477]: League of Legends is a team game after all so it’s a good idea to always take a look to see what went wrong or right for your team.
            - paragraph [ref=e478]:
              - img "post game team comparison stats" [ref=e479]
            - paragraph [ref=e480]: Here you’ll find stat comparisons for things like damage and gold as well as counts for objectives for Towers, Drakes, Elder Dragons, and Barons.
            - paragraph [ref=e481]: "If you want even more team stat comparisons, we provide deeper dives with toggles:"
            - paragraph [ref=e482]: For Damage, you can toggle between damage dealt and damage taken.
            - paragraph [ref=e483]:
              - img "damage post game" [ref=e484]
            - paragraph [ref=e485]: Income allows you to see your CS numbers or your overall income. After all, gold comes from multiple sources.
            - paragraph [ref=e486]
            - paragraph [ref=e487]: Finally, we have wards which allow you to toggle between wards placed and wards cleared!
            - paragraph [ref=e488]
            - heading "Widget Cutomization" [level=4] [ref=e489]
            - paragraph [ref=e490]: The last Live Companion feature that we’ve added and want to highlight is Widget Customization!
            - paragraph [ref=e491]: All of the tools we’ve shown you in this article can be tailored to fit your own needs and preferences.
            - paragraph [ref=e492]: Want your builds and advice at the top? Just drag them around as you please.
            - paragraph [ref=e493]:
              - img "widget customization" [ref=e494]
            - paragraph [ref=e495]: You can even prevent widgets from showing up by pressing on the eyeball icon!
            - heading "Closing Thoughts and Suggestions" [level=4] [ref=e496]
            - paragraph [ref=e497]: We’ve covered a lot in this article due to the sheer amount of tools and features that the Live Companion offers.
            - paragraph [ref=e498]:
              - text: It can be overwhelming at first but remember that you don’t need to use
              - emphasis [ref=e499]: every
              - text: widget
              - emphasis [ref=e500]: every
              - text: match.
            - paragraph [ref=e501]: Focus on the tools you need when you need them most!
            - paragraph [ref=e502]: Move everything around and make it your own – before long using it will feel like second nature.
            - paragraph [ref=e503]: To get the most of out the tool, we also recommend using it alongside a second monitor or on your phone so you can use it as an easy reference for your match.
