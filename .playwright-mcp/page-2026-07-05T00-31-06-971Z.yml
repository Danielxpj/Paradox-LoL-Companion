            - paragraph [ref=f92e106]:
              - text: Dominate the Rift with the official
              - link "Porofessor.gg" [ref=f92e107] [cursor=pointer]:
                - /url: https://porofessor.gg/
              - text: app - your all-in-one League of Legends overlay, tracker, and assistant.
            - paragraph [ref=f92e108]: Built by players for players, Porofessor overlays your game with real-time insights, builds, and analytics to give you the edge every match. Get the ultimate LoL companion that helps you plan, play, and win - completely free.
            - heading "Before the match:" [level=3] [ref=f92e109]
            - list [ref=f92e110]:
              - listitem [ref=f92e111]:
                - strong [ref=f92e112]: "Meta Overview:"
                - text: gives you a detailed overview of your champions current standing in the meta, including counter picks and ban suggestions, and recommended runes that you can import straight into the game.
              - listitem [ref=f92e113]:
                - strong [ref=f92e114]: "Scouting:"
                - text: Gain detailed insights into your team and the enemy team, uncovering their strengths and vulnerabilities.
              - listitem [ref=f92e115]:
                - strong [ref=f92e116]: "Champion-Specific Stats:"
                - text: Win rate, matches played, and KDA for each player’s current champion.
              - listitem [ref=f92e117]:
                - strong [ref=f92e118]: "Ranking Data:"
                - text: Current rank, ranking history, and progression trends.
              - listitem [ref=f92e119]:
                - strong [ref=f92e120]: "Role Specialization:"
                - text: Main roles and current role assignment for each player.
              - listitem [ref=f92e121]:
                - strong [ref=f92e122]: "Recent Match History:"
                - text: Gain insight into how players performed in their most recent games.
            - heading "During the match:" [level=3] [ref=f92e123]
            - list [ref=f92e124]:
              - listitem [ref=f92e125]:
                - strong [ref=f92e126]: "Jungle and Objective Timers:"
                - text: Stay ahead by tracking jungle creature and major objective respawn times. Porofessor ensures you're always ready to secure key advantages.
              - listitem [ref=f92e127]:
                - strong [ref=f92e128]: "Team Gold Difference:"
                - text: Track the gold gap between teams in real time to understand your advantage or spot opportunities.
              - listitem [ref=f92e129]:
                - strong [ref=f92e130]: "Champion-Specific Stats:"
                - text: Win rate, matches played, and KDA for each player’s current champion.
              - listitem [ref=f92e131]:
                - strong [ref=f92e132]: "Gold Tracking:"
                - text: Gold earned at @10 and @20 minutes, including easy-to-read graphs.
              - listitem [ref=f92e133]:
                - strong [ref=f92e134]: "CS Insights:"
                - text: Minions killed at @10 and @20 minutes with visual trends.
              - listitem [ref=f92e135]:
                - strong [ref=f92e136]: "Vision Mastery:"
                - text: Wards placed at @10 and @20 minutes, helping you track vision control.
              - listitem [ref=f92e137]:
                - strong [ref=f92e138]: "Kill Participation:"
                - text: See how involved each player is in their team’s kills.
              - listitem [ref=f92e139]:
                - strong [ref=f92e140]: "Damage Metrics:"
                - text: Damage per minute to evaluate player impact.
              - listitem [ref=f92e141]:
                - strong [ref=f92e142]: "Lane Matchup Analysis:"
                - text: Win rate against the lane opponent for informed gameplay.
            - heading "Post-Match Insights - Best-in-Class Analytics" [level=3] [ref=f92e143]
            - list [ref=f92e144]:
              - listitem [ref=f92e145]: Dive deep into your performance with comprehensive post-match analytics. Porofessor records and presents everything you need to know in intuitive graphs and detailed stats, offering insights into your gameplay, your team's performance, and your opponents' strategies. If it’s worth knowing, Porofessor has it covered!
            - paragraph [ref=f92e146]: Why Choose Porofessor? Porofessor transforms how you approach each match by delivering game-changing insights directly in-game. Whether you're climbing solo or strategizing with friends, this app ensures you make informed decisions to outplay the competition, without reducing your FPS at all.
            - paragraph [ref=f92e147]: Download Porofessor now and take your League of Legends performance to the next level!
